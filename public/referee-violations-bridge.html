<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Referee Violations Bridge</title>
</head>
<body>
<script>
(function () {
  const KEY = 'referee_recorded_violations_v1';

  function isMoOrigin(origin) {
    if (!origin) return false;
    return origin.startsWith('http://localhost:')
      || origin.startsWith('http://127.0.0.1:')
      || origin.startsWith('https://localhost:')
      || origin.startsWith('https://127.0.0.1:');
  }

  window.addEventListener('message', function (event) {
    if (!isMoOrigin(event.origin)) return;
    var data = event.data;
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch (e) { return; }
    }
    if (!data || typeof data !== 'object') return;

    if (data.type === 'REF_GET_VIOLATIONS') {
      event.source.postMessage(JSON.stringify({
        type: 'REF_VIOLATIONS_DATA',
        requestId: data.requestId,
        json: localStorage.getItem(KEY) || '[]',
      }), event.origin);
      return;
    }

    if (data.type === 'REF_SET_VIOLATIONS') {
      try {
        localStorage.setItem(KEY, data.json || '[]');
        event.source.postMessage(JSON.stringify({
          type: 'REF_VIOLATIONS_OK',
          requestId: data.requestId,
        }), event.origin);
      } catch (error) {
        event.source.postMessage(JSON.stringify({
          type: 'REF_VIOLATIONS_ERR',
          requestId: data.requestId,
          message: String(error),
        }), event.origin);
      }
    }
  });
})();
</script>
</body>
</html>
