name: Deploy Frontend to Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create production env
        run: |
          echo "VITE_API_BASE_URL=https://api.horseracing.id.vn/api/v1" > .env.production

      - name: Install dependencies
        run: |
          npm install

      - name: Build frontend
        run: |
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -p 22 -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          tar -czf dist.tar.gz dist
          scp -P 22 -i ~/.ssh/oracle_key dist.tar.gz \
          ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}:/tmp/dist.tar.gz

      - name: Deploy frontend
        run: |
          ssh -p 22 -i ~/.ssh/oracle_key \
          ${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }} \
          "rm -rf /tmp/horse-fe && \
          mkdir -p /tmp/horse-fe && \
          tar -xzf /tmp/dist.tar.gz -C /tmp/horse-fe && \
          sudo rm -rf /var/www/horse-fe/* && \
          sudo cp -r /tmp/horse-fe/dist/* /var/www/horse-fe/ && \
          sudo chown -R www-data:www-data /var/www/horse-fe && \
          sudo systemctl reload nginx && \
          echo 'REPO=${{ github.repository }}' | sudo tee /var/www/horse-fe/deploy-info.txt && \
          echo 'BRANCH=${{ github.ref_name }}' | sudo tee -a /var/www/horse-fe/deploy-info.txt && \
          echo 'COMMIT=${{ github.sha }}' | sudo tee -a /var/www/horse-fe/deploy-info.txt && \
          echo 'RUN_ID=${{ github.run_id }}' | sudo tee -a /var/www/horse-fe/deploy-info.txt"


